<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Elan — Goal Framework</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:#f0f7f6;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px;}
.page{width:100%;max-width:960px;}

/* ── Top bar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.page-title{font-size:20px;font-weight:600;color:#0D2B2A;letter-spacing:-0.01em;}
.elan-logo{display:flex;align-items:center;gap:7px;}
.elan-e{display:flex;flex-direction:column;gap:2.5px;width:16px;}
.elan-e span{display:block;height:3px;background:#2A9D8F;border-radius:1px;}
.elan-e span:nth-child(2){width:80%;clip-path:polygon(0 0,85% 0,100% 50%,85% 100%,0 100%);}
.elan-wordmark{font-size:15px;font-weight:600;letter-spacing:0.1em;color:#2A9D8F;}
.sub{font-size:12px;color:#5a7a78;margin-bottom:12px;}

/* ── KPI Bar ── */
.kpi-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.kpi-card{background:#fff;border:0.5px solid #c8e8e3;border-radius:8px;padding:10px 14px;display:flex;flex-direction:column;gap:2px;}
.kpi-label{font-size:9.5px;font-weight:500;color:#5a7a78;text-transform:uppercase;letter-spacing:0.04em;}
.kpi-value{font-size:22px;font-weight:600;color:#0D2B2A;line-height:1.1;}
.kpi-meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.kpi-updated{font-size:9px;color:#9bbfba;}
.kpi-edit-btn{font-size:9px;color:#2A9D8F;cursor:pointer;border:0.5px solid #c8e8e3;background:#f4faf9;border-radius:3px;padding:2px 6px;font-family:inherit;}
.kpi-edit-btn:hover{background:#e0f0ee;}

/* ── Owner legend ── */
.owner-legend{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.ol-item{display:flex;align-items:center;gap:5px;font-size:10.5px;color:#3a5a58;}
.ol-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;width:100%;}
.cell{border-radius:4px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:9px;font-weight:400;padding:3px 2px;min-height:54px;line-height:1.25;word-break:break-word;position:relative;font-family:'IBM Plex Sans',sans-serif;transition:filter 0.1s;}
.cell.editable{cursor:pointer;}
.cell.editable:hover{filter:brightness(0.91);}

/* Core */
.cell.core{background:#0D2B2A;color:#E8F5F3;font-size:8.5px;font-weight:600;white-space:pre-line;}

/* Theme centre & surround ring */
.cell.theme,.cell.theme-surround{background:#2A9D8F;color:#E8F5F3;font-weight:600;font-size:9px;white-space:pre-line;cursor:pointer;}
.cell.theme:hover,.cell.theme-surround:hover{filter:brightness(0.91);}

/* Owner colours for action cells */
.cell.owner-CEO  {background:#E8F5F3;color:#0D2B2A;}
.cell.owner-Pres {background:#D6E8FA;color:#1A3F6F;}
.cell.owner-CTO  {background:#FEF3DC;color:#7A4F00;}
.cell.owner-All  {background:#EAF0EF;color:#2A4A47;}
.cell.empty      {background:#fff;color:#9bbfba;border:0.5px solid #c8e8e3;}

.cell.active-edit{outline:2px solid #2A9D8F;outline-offset:-2px;}

/* Tip dot */
.tip-dot{display:none;position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.7);pointer-events:none;}
.cell.has-tip .tip-dot{display:block;}
.cell.owner-CEO.has-tip .tip-dot,.cell.owner-All.has-tip .tip-dot{background:#2A9D8F;}

/* Tooltip */
.tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#0D2B2A;border-radius:6px;padding:8px 10px;font-size:10.5px;color:#E8F5F3;width:190px;z-index:99;line-height:1.5;display:none;pointer-events:none;white-space:normal;text-align:left;}
.cell:hover .tooltip{display:block;}

/* Owner tag */
.owner-tag{position:absolute;bottom:3px;left:3px;font-size:7px;font-weight:600;opacity:0.65;pointer-events:none;letter-spacing:0.03em;}

/* ── Editor panel ── */
.editor{margin-top:12px;background:#fff;border:0.5px solid #c8e8e3;border-radius:8px;padding:16px;display:none;}
.editor.open{display:block;}
.editor-title{font-size:12px;font-weight:600;color:#0D2B2A;margin-bottom:12px;}
.editor label{font-size:11px;color:#5a7a78;display:block;margin-bottom:4px;}
.editor input,.editor textarea,.editor select{width:100%;border:0.5px solid #c8e8e3;border-radius:5px;padding:7px 10px;font-size:12px;font-family:'IBM Plex Sans',sans-serif;color:#0D2B2A;background:#f4faf9;margin-bottom:12px;resize:none;outline:none;}
.editor input:focus,.editor textarea:focus,.editor select:focus{border-color:#2A9D8F;background:#fff;}
.editor textarea{height:68px;}
.editor-btns{display:flex;gap:8px;flex-wrap:wrap;}
.ebtn{border:0.5px solid #c8e8e3;background:#f4faf9;color:#0D2B2A;border-radius:5px;padding:6px 14px;font-size:11.5px;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;transition:background 0.1s;}
.ebtn:hover{background:#e0f0ee;}
.ebtn.primary{background:#2A9D8F;color:#E8F5F3;border-color:#2A9D8F;}
.ebtn.primary:hover{background:#227f72;}
.ebtn.danger{color:#c0392b;border-color:#f5c6c6;}
.ebtn.danger:hover{background:#fdf0f0;}

/* ── Bottom bar ── */
.bottom{display:flex;align-items:center;justify-content:space-between;margin-top:10px;flex-wrap:wrap;gap:8px;}
.legend{display:flex;gap:12px;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:5px;font-size:10.5px;color:#5a7a78;}
.ld{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.status{font-size:11px;color:#2A9D8F;font-weight:500;min-height:16px;}
.status.error{color:#c0392b;}

/* KPI modal */
.kpi-modal-bg{position:fixed;inset:0;background:rgba(13,43,42,0.4);z-index:200;display:flex;align-items:center;justify-content:center;}
.kpi-modal{background:#fff;border-radius:10px;padding:22px;width:280px;font-family:'IBM Plex Sans',sans-serif;box-shadow:0 4px 24px rgba(0,0,0,0.12);}
.kpi-modal-title{font-size:13px;font-weight:600;color:#0D2B2A;margin-bottom:14px;}
.kpi-modal label{font-size:11px;color:#5a7a78;display:block;margin-bottom:4px;}
.kpi-modal input{width:100%;border:0.5px solid #c8e8e3;border-radius:5px;padding:7px 10px;font-size:13px;font-family:'IBM Plex Sans',sans-serif;color:#0D2B2A;background:#f4faf9;margin-bottom:14px;outline:none;}
.kpi-modal input:focus{border-color:#2A9D8F;background:#fff;}
.kpi-modal-btns{display:flex;gap:8px;justify-content:flex-end;}

@media(max-width:600px){.cell{font-size:7.5px;min-height:42px;}.grid{gap:2px;}.kpi-bar{grid-template-columns:1fr;}}
</style>
</head>

// Owner colours
const OWNER_CLASS = {CEO:'owner-CEO', Pres:'owner-Pres', CTO:'owner-CTO', All:'owner-All'};
const OWNER_LABEL = {CEO:'CEO', Pres:'Pres', CTO:'CTO', All:'All'};

let state = {};
let activeKey = null;
let activeDiv = null;
let activeIsTheme = false;
let activeDefault = null;

const SB_HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=minimal'
};

function showStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
  if (msg && !isError) setTimeout(() => { if(el.textContent===msg) el.textContent=''; }, 3000);
}

async function loadState() {
  showStatus('Loading...');
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${ROW_ID}&select=data`, {headers: SB_HEADERS});
    const rows = await res.json();
    state = (rows && rows.length > 0 && rows[0].data) ? rows[0].data : {};
    showStatus('');
  } catch(e) {
    state = {};
    showStatus('Could not load — check connection', true);
  }
  renderKpis();
  render();
}

async function saveState() {
  showStatus('Saving...');
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
      method: 'POST',
      headers: {...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates'},
      body: JSON.stringify({id: ROW_ID, data: state})
    });
    if (res.ok || res.status === 201 || res.status === 204) {
      showStatus('Saved for the whole team');
    } else {
      throw new Error(await res.text());
    }
  } catch(e) {
    showStatus('Save failed — ' + e.message, true);
  }
}

// ── KPI ──────────────────────────────────────────────────────
function renderKpis() {
  // Days since founding — always calculated
  const founded = new Date('2025-05-24');
  const today = new Date();
  const days = Math.floor((today - founded) / 86400000);
  document.getElementById('kpi-days').textContent = days.toLocaleString();

  // LinkedIn
  const li = state.__kpi_linkedin;
  document.getElementById('kpi-linkedin').textContent = li ? Number(li.value).toLocaleString() : '—';
  document.getElementById('kpi-linkedin-date').textContent = li ? 'Updated ' + li.date : '';

  // Visits
  const v = state.__kpi_visits;
  document.getElementById('kpi-visits').textContent = v ? Number(v.value).toLocaleString() : '—';
  document.getElementById('kpi-visits-date').textContent = v ? 'Updated ' + v.date : '';
}

let activeKpi = null;
function openKpi(key) {
  activeKpi = key;
  const titles = {linkedin: 'Update LinkedIn Followers', visits: 'Update Monthly Website Visits'};
  const current = state['__kpi_' + key];
  const bg = document.createElement('div');
  bg.className = 'kpi-modal-bg';
  bg.id = 'kpi-modal-bg';
  const m = document.createElement('div');
  m.className = 'kpi-modal';
  m.innerHTML = `<div class="kpi-modal-title">${titles[key]}</div>
<label>New value</label>
<input id="kpi-input" type="number" min="0" placeholder="e.g. 1250" value="${current ? current.value : ''}"/>
<div class="kpi-modal-btns">
  <button class="ebtn" id="kpi-cancel">Cancel</button>
  <button class="ebtn primary" id="kpi-save">Save</button>
</div>`;
  bg.appendChild(m);
  document.body.appendChild(bg);
  m.querySelector('#kpi-input').focus();
  m.querySelector('#kpi-cancel').addEventListener('click', () => bg.remove());
  bg.addEventListener('click', e => { if(e.target===bg) bg.remove(); });
  m.querySelector('#kpi-save').addEventListener('click', async () => {
    const val = parseInt(m.querySelector('#kpi-input').value);
    if (isNaN(val)) return;
    const today = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    state['__kpi_' + key] = {value: val, date: today};
    bg.remove();
    renderKpis();
    await saveState();
  });
}

// ── Editor ───────────────────────────────────────────────────
function openEditor(div, key, label, owner, tip, isTheme, def) {
  if (activeDiv) activeDiv.classList.remove('active-edit');
  activeKey = key; activeDiv = div; activeIsTheme = isTheme; activeDefault = def;
  div.classList.add('active-edit');
  const ed = document.getElementById('editor');
  ed.classList.add('open');
  document.getElementById('editor-title').textContent = 'Editing cell';
  document.getElementById('e-label').value = label.replace(/\n/g,' ') || '';
  document.getElementById('e-owner').value = owner || 'CEO';
  document.getElementById('e-tip').value = tip || '';
  // Hide owner/tip for theme cells
  document.getElementById('e-owner-wrap').style.display = isTheme ? 'none' : 'block';
  document.getElementById('e-tip-wrap').style.display = isTheme ? 'none' : 'block';
  document.getElementById('e-clear').textContent = isTheme ? 'Reset to default' : 'Clear cell';
  document.getElementById('e-label').focus();
  ed.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function closeEditor() {
  document.getElementById('editor').classList.remove('open');
  if (activeDiv) activeDiv.classList.remove('active-edit');
  activeKey = null; activeDiv = null;
}

document.getElementById('e-save').addEventListener('click', async () => {
  if (!activeKey) return;
  const lv = document.getElementById('e-label').value.trim();
  const ov = activeIsTheme ? (activeDefault ? activeDefault.owner || '' : '') : document.getElementById('e-owner').value;
  const tv = activeIsTheme ? '' : document.getElementById('e-tip').value.trim();
  state[activeKey] = {label: lv, owner: ov, tip: tv};
  refreshCell(activeDiv, lv, ov, tv, activeIsTheme);
  closeEditor();
  await saveState();
});

document.getElementById('e-clear').addEventListener('click', async () => {
  if (!activeKey) return;
  if (activeIsTheme) {
    delete state[activeKey];
    const def = activeDefault;
    refreshCell(activeDiv, def.label, '', '', true);
  } else {
    delete state[activeKey];
    const def = activeDefault;
    if (def) refreshCell(activeDiv, def.label, def.owner, def.tip, false);
    else refreshCell(activeDiv, '', '', '', false);
  }
  closeEditor();
  await saveState();
});

document.getElementById('e-cancel').addEventListener('click', closeEditor);

function refreshCell(div, label, owner, tip, isTheme) {
  const span = div.querySelector('span');
  span.textContent = label;
  if (!isTheme) {
    // Update owner class
    div.classList.remove('owner-CEO','owner-Pres','owner-CTO','owner-All','empty');
    if (label) {
      div.classList.add(OWNER_CLASS[owner] || 'owner-All');
    } else {
      div.classList.add('empty');
    }
    // Update owner tag
    const tag = div.querySelector('.owner-tag');
    if (tag) tag.textContent = label ? (OWNER_LABEL[owner] || '') : '';
  }
  // Tip dot + tooltip
  div.classList.remove('has-tip');
  const oldTT = div.querySelector('.tooltip');
  if (oldTT) oldTT.remove();
  if (tip) {
    div.classList.add('has-tip');
    const tt = document.createElement('div');
    tt.className = 'tooltip'; tt.textContent = tip;
    div.insertBefore(tt, div.querySelector('.tip-dot'));
  }
}

// ── Render ───────────────────────────────────────────────────
function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  for (let br = 0; br < 3; br++) {
    for (let cr = 0; cr < 3; cr++) {
      for (let bc = 0; bc < 3; bc++) {
        const bi = br * 3 + bc;
        const theme = BLOCK_ORDER[bi];
        const isCore = theme === 'CORE';
        const themeData = DEFAULTS[theme];

        for (let cc = 0; cc < 3; cc++) {
          const isCenter = cr === 1 && cc === 1;
          const div = document.createElement('div');
          div.className = 'cell';
          let text = '', owner = '', tip = '', key = '', isTheme = false, def = null;

          if (isCore) {
            if (isCenter) {
              text = '25 Deals\nClosed by\nApril 2029';
              div.classList.add('core');
            } else {
              // Surround ring — editable theme labels
              const sk = SURROUND_KEYS[cr * 3 + cc];
              if (sk) {
                key = `surround_${sk.replace(/\W+/g,'_')}`;
                const saved = state[key];
                const defLabel = (DEFAULTS[sk] || {}).label || sk;
                text = saved ? (saved.label || defLabel) : defLabel;
                tip = '';
                div.classList.add('theme-surround');
                isTheme = true;
                def = {label: defLabel};
              }
            }
          } else if (themeData) {
            if (isCenter) {
              key = `theme_center_${theme.replace(/\W+/g,'_')}`;
              const saved = state[key];
              text = saved ? (saved.label || themeData.label) : themeData.label;
              div.classList.add('theme');
              isTheme = true;
              def = {label: themeData.label};
            } else {
              // Action cell — figure out index (skip center)
              const localIdx = cr * 3 + cc;
              const actionIdx = localIdx < 4 ? localIdx : localIdx - 1;
              const defCell = themeData.cells[actionIdx] || null;
              key = `em_b${bi}_r${cr}_c${cc}`;
              const saved = state[key];

              if (saved !== undefined) {
                text  = saved.label || '';
                owner = saved.owner || (defCell ? defCell.owner : 'CEO');
                tip   = saved.tip   || '';
              } else if (defCell) {
                text  = defCell.label;
                owner = defCell.owner;
                tip   = defCell.tip;
              }

              def = defCell;
              div.classList.add('editable');
              if (text) {
                div.classList.add(OWNER_CLASS[owner] || 'owner-All');
              } else {
                div.classList.add('empty');
              }
              if (tip) div.classList.add('has-tip');

              // Owner tag
              const tag = document.createElement('div');
              tag.className = 'owner-tag';
              tag.textContent = text ? (OWNER_LABEL[owner] || '') : '';
              div.appendChild(tag);
            }
          }

          const span = document.createElement('span');
          span.style.cssText = 'display:block;width:100%;white-space:pre-line;pointer-events:none;';
          span.textContent = text;
          div.appendChild(span);

          const dot = document.createElement('div');
          dot.className = 'tip-dot';
          div.appendChild(dot);

          if (tip) {
            const tt = document.createElement('div');
            tt.className = 'tooltip'; tt.textContent = tip;
            div.insertBefore(tt, dot);
          }

          if (key && (isTheme || themeData)) {
            const _key = key, _isTheme = isTheme, _def = def;
            div.addEventListener('click', () => {
              const curLabel = div.querySelector('span').textContent;
              const curOwner = _isTheme ? '' : (state[_key] ? state[_key].owner : (_def ? _def.owner : 'CEO'));
              const curTip   = div.querySelector('.tooltip') ? div.querySelector('.tooltip').textContent : '';
              openEditor(div, _key, curLabel, curOwner, curTip, _isTheme, _def);
            });
          }

          grid.appendChild(div);
        }
      }
    }
  }
}

loadState();
</script>
