<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Elan — Goal Framework</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:#f0f7f6;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px;}
.page{width:100%;max-width:980px;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.page-title{font-size:20px;font-weight:600;color:#0D2B2A;letter-spacing:-0.01em;}
.elan-logo{display:flex;align-items:center;gap:7px;}
.elan-e{display:flex;flex-direction:column;gap:2.5px;width:16px;}
.elan-e span{display:block;height:3px;background:#2A9D8F;border-radius:1px;}
.elan-e span:nth-child(2){width:80%;clip-path:polygon(0 0,85% 0,100% 50%,85% 100%,0 100%);}
.elan-wordmark{font-size:15px;font-weight:600;letter-spacing:0.1em;color:#2A9D8F;}
.sub{font-size:12px;color:#5a7a78;margin-bottom:12px;}

/* KPI */
.kpi-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.kpi-card{background:#fff;border:0.5px solid #c8e8e3;border-radius:8px;padding:10px 14px;display:flex;flex-direction:column;gap:2px;}
.kpi-label{font-size:9.5px;font-weight:500;color:#5a7a78;text-transform:uppercase;letter-spacing:0.04em;}
.kpi-value{font-size:22px;font-weight:600;color:#0D2B2A;line-height:1.1;}
.kpi-meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.kpi-updated{font-size:9px;color:#9bbfba;}
.kpi-edit-btn{font-size:9px;color:#2A9D8F;cursor:pointer;border:0.5px solid #c8e8e3;background:#f4faf9;border-radius:3px;padding:2px 6px;font-family:inherit;}
.kpi-edit-btn:hover{background:#e0f0ee;}

/* Legend */
.owner-legend{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.ol-item{display:flex;align-items:center;gap:5px;font-size:10.5px;color:#3a5a58;}
.ol-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;width:100%;}
.block{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;}
.cell{border-radius:4px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:8.5px;font-weight:400;padding:3px 2px;min-height:56px;line-height:1.22;word-break:break-word;position:relative;font-family:'IBM Plex Sans',sans-serif;transition:filter 0.1s;}
.cell.editable{cursor:pointer;}
.cell.editable:hover{filter:brightness(0.92);}
.cell.core{background:#0D2B2A;color:#E8F5F3;font-size:8.5px;font-weight:600;white-space:pre-line;}
.cell.theme,.cell.theme-surround{background:#ffffff;color:#0D2B2A;font-weight:600;font-size:9px;white-space:pre-line;cursor:pointer;border:1px solid #c8e8e3;}
.cell.theme:hover,.cell.theme-surround:hover{filter:brightness(0.96);}
.cell.near-term{background:#002060;color:#ffffff;}
.cell.long-term{background:#2A9D8F;color:#ffffff;}
.cell.empty{background:#fff;color:#9bbfba;border:0.5px solid #c8e8e3;}
.cell.active-edit{outline:2px solid #E9A23B;outline-offset:-2px;z-index:5;}
.tip-dot{display:none;position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.6);pointer-events:none;}
.cell.has-tip .tip-dot{display:block;}
.tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#0D2B2A;border-radius:6px;padding:8px 10px;font-size:10.5px;color:#E8F5F3;width:190px;z-index:99;line-height:1.5;display:none;pointer-events:none;white-space:normal;text-align:left;}
.cell:hover .tooltip{display:block;}
.owner-tag{position:absolute;bottom:3px;left:4px;font-size:7px;font-weight:600;opacity:0.7;pointer-events:none;letter-spacing:0.03em;}

/* Editor */
.editor{margin-top:12px;background:#fff;border:0.5px solid #c8e8e3;border-radius:8px;padding:16px;display:none;}
.editor.open{display:block;}
.editor-title{font-size:12px;font-weight:600;color:#0D2B2A;margin-bottom:12px;}
.editor label{font-size:11px;color:#5a7a78;display:block;margin-bottom:4px;}
.editor input,.editor textarea,.editor select{width:100%;border:0.5px solid #c8e8e3;border-radius:5px;padding:7px 10px;font-size:12px;font-family:'IBM Plex Sans',sans-serif;color:#0D2B2A;background:#f4faf9;margin-bottom:12px;resize:none;outline:none;}
.editor input:focus,.editor textarea:focus,.editor select:focus{border-color:#2A9D8F;background:#fff;}
.editor textarea{height:68px;}
.editor-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.editor-btns{display:flex;gap:8px;flex-wrap:wrap;}
.ebtn{border:0.5px solid #c8e8e3;background:#f4faf9;color:#0D2B2A;border-radius:5px;padding:6px 14px;font-size:11.5px;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;}
.ebtn:hover{background:#e0f0ee;}
.ebtn.primary{background:#2A9D8F;color:#E8F5F3;border-color:#2A9D8F;}
.ebtn.primary:hover{background:#227f72;}
.ebtn.danger{color:#c0392b;border-color:#f5c6c6;}
.ebtn.danger:hover{background:#fdf0f0;}

.bottom{display:flex;align-items:center;justify-content:flex-end;margin-top:10px;}
.status{font-size:11px;color:#2A9D8F;font-weight:500;min-height:16px;}
.status.error{color:#c0392b;}

.kpi-modal-bg{position:fixed;inset:0;background:rgba(13,43,42,0.4);z-index:200;display:flex;align-items:center;justify-content:center;}
.kpi-modal{background:#fff;border-radius:10px;padding:22px;width:280px;box-shadow:0 4px 24px rgba(0,0,0,0.12);}
.kpi-modal-title{font-size:13px;font-weight:600;color:#0D2B2A;margin-bottom:14px;}
.kpi-modal label{font-size:11px;color:#5a7a78;display:block;margin-bottom:4px;}
.kpi-modal input{width:100%;border:0.5px solid #c8e8e3;border-radius:5px;padding:7px 10px;font-size:13px;font-family:inherit;color:#0D2B2A;background:#f4faf9;margin-bottom:14px;outline:none;}
.kpi-modal input:focus{border-color:#2A9D8F;background:#fff;}
.kpi-modal-btns{display:flex;gap:8px;justify-content:flex-end;}

@media(max-width:600px){.cell{font-size:7px;min-height:42px;}.grid{gap:2px;}.kpi-bar{grid-template-columns:1fr;}}
</style>
</head>

<div class="page">
  <div class="topbar">
    <div class="page-title">Elan — Goal Framework</div>

    </div>

  <div class="owner-legend">
    <div class="ol-item"><div class="ol-dot" style="background:#002060;"></div>Near-term (&lt;12 months)</div>
    <div class="ol-item"><div class="ol-dot" style="background:#2A9D8F;"></div>Long-term (12+ months)</div>
    <div class="ol-item" style="margin-left:8px;color:#9bbfba;">|</div>
    <div class="ol-item">CEO = Yash &nbsp; Pres = Rohit &nbsp; CTO = Ashar</div>

  <div class="grid" id="grid"></div>

  <div class="editor" id="editor">

    <div class="editor-row" id="e-meta-row">
      <div>
        <label>Owner</label>

          <option value="CEO">Yash (CEO)</option>
          <option value="Pres">Rohit (Pres)</option>

    </div>
    <div id="e-tip-wrap">
      <label>Reasoning (optional)</label>
      <textarea id="e-tip" placeholder="Why does this matter?"></textarea>
    </div>
    <div class="editor-btns">
      <button class="ebtn primary" id="e-save">Save</button>
      <button class="ebtn danger" id="e-clear">Reset to default</button>
      <button class="ebtn" id="e-cancel">Cancel</button>
    </div>
  </div>

  <div class="bottom"><div class="status" id="status"></div></div>
</div>

<script>

const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNya3RsenRmc3lxYnduZ3VxcWpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDI4NjYsImV4cCI6MjA5MzQ3ODg2Nn0.IGpfgsGw0NNadnfm8kA-yY6b3wW-9q5o0PRA8CI1LS4';

   {l:'Industry Events\n(5x Year)',o:'Pres',t:'L',tip:''},
   {l:'Buyer Mandates\n(2-3x Yr)',o:'Pres',t:'L',tip:'Every buyer should know your deal criteria in one sentence'},
   {l:'Quarterly Sector\nNewsletter',o:'CTO',t:'N',tip:'Send buyers a short market update to stay top of mind without selling'},
   {l:'Precedent\nTool',o:'CTO',t:'L',tip:''},

 ]},
 'Pipeline':{center:'Partners /\nReferrals',cells:[

   {l:'Referral\nDatabase',o:'Pres',t:'L',tip:''},

};

const OWNER_LABEL={CEO:'CEO',Pres:'Pres',CTO:'CTO',All:'All'};

let state={};let activeKey=null;let activeDiv=null;let activeIsTheme=false;let activeDefault=null;

const SB={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'};

function showStatus(m,e){const el=document.getElementById('status');el.textContent=m;el.className='status'+(e?' error':'');if(m&&!e)setTimeout(()=>{if(el.textContent===m)el.textContent='';},3000);}

async function loadState(){
  showStatus('Loading...');
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${ROW_ID}&select=data`,{headers:SB});
    const rows=await res.json();
    state=(rows&&rows.length>0&&rows[0].data)?rows[0].data:{};
    showStatus('');
  }catch(e){state={};showStatus('Could not load — check connection',true);}
  renderKpis();render();
}

async function saveState(){
  showStatus('Saving...');
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`,{method:'POST',headers:{...SB,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({id:ROW_ID,data:state})});
    if(res.ok||res.status===201||res.status===204){showStatus('Saved for the whole team');}
    else{throw new Error(await res.text());}
  }catch(e){showStatus('Save failed — '+e.message,true);}
}

function renderKpis(){
  const founded=new Date('2025-05-24');const today=new Date();
  document.getElementById('kpi-days').textContent=Math.floor((today-founded)/86400000).toLocaleString();
  const li=state.__kpi_linkedin;
  document.getElementById('kpi-linkedin').textContent=li?Number(li.value).toLocaleString():'—';
  document.getElementById('kpi-linkedin-date').textContent=li?'Updated '+li.date:'';
  const v=state.__kpi_visits;
  document.getElementById('kpi-visits').textContent=v?Number(v.value).toLocaleString():'—';
  document.getElementById('kpi-visits-date').textContent=v?'Updated '+v.date:'';
}

function openKpi(key){
  const titles={linkedin:'Update LinkedIn Followers',visits:'Update Monthly Website Visits'};
  const cur=state['__kpi_'+key];
  const bg=document.createElement('div');bg.className='kpi-modal-bg';
  const m=document.createElement('div');m.className='kpi-modal';
  m.innerHTML=`<div class="kpi-modal-title">${titles[key]}</div><label>New value</label><input id="kpi-input" type="number" min="0" placeholder="e.g. 1250" value="${cur?cur.value:''}"/><div class="kpi-modal-btns"><button class="ebtn" id="kpi-cancel">Cancel</button><button class="ebtn primary" id="kpi-save">Save</button></div>`;
  bg.appendChild(m);document.body.appendChild(bg);
  m.querySelector('#kpi-input').focus();
  m.querySelector('#kpi-cancel').onclick=()=>bg.remove();
  bg.onclick=e=>{if(e.target===bg)bg.remove();};
  m.querySelector('#kpi-save').onclick=async()=>{
    const val=parseInt(m.querySelector('#kpi-input').value);if(isNaN(val))return;
    const today=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    state['__kpi_'+key]={value:val,date:today};bg.remove();renderKpis();await saveState();
  };
}

function openEditor(div,key,label,owner,term,tip,isTheme,def){
  if(activeDiv)activeDiv.classList.remove('active-edit');
  activeKey=key;activeDiv=div;activeIsTheme=isTheme;activeDefault=def;
  div.classList.add('active-edit');
  const ed=document.getElementById('editor');ed.classList.add('open');
  document.getElementById('editor-title').textContent='Edit cell';
  document.getElementById('e-label').value=label.replace(/\n/g,' ')||'';
  document.getElementById('e-owner').value=owner||'CEO';
  document.getElementById('e-term').value=term||'L';
  document.getElementById('e-tip').value=tip||'';
  document.getElementById('e-meta-row').style.display=isTheme?'none':'grid';
  document.getElementById('e-tip-wrap').style.display=isTheme?'none':'block';
  document.getElementById('e-label').focus();
  ed.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function closeEditor(){document.getElementById('editor').classList.remove('open');if(activeDiv)activeDiv.classList.remove('active-edit');activeKey=null;activeDiv=null;}

document.getElementById('e-save').onclick=async()=>{
  if(!activeKey)return;
  const lv=document.getElementById('e-label').value.trim();
  if(activeIsTheme){state[activeKey]={label:lv};}
  else{
    const ov=document.getElementById('e-owner').value;
    const tv=document.getElementById('e-term').value;
    const rv=document.getElementById('e-tip').value.trim();
    state[activeKey]={label:lv,owner:ov,term:tv,tip:rv};
  }
  closeEditor();await saveState();render();
};
document.getElementById('e-clear').onclick=async()=>{
  if(!activeKey)return;delete state[activeKey];closeEditor();await saveState();render();
};
document.getElementById('e-cancel').onclick=closeEditor;

function render(){
  const grid=document.getElementById('grid');grid.innerHTML='';
  // Build 9 block containers in reading order (block index 0..8)
  for(let bi=0;bi<9;bi++){
    const theme=BLOCK_ORDER[bi];
    const isCore=theme==='CORE';const td=DEFAULTS[theme];
    const block=document.createElement('div');block.className='block';

    for(let cr=0;cr<3;cr++){
      for(let cc=0;cc<3;cc++){
        const isCenter=cr===1&&cc===1;
        const div=document.createElement('div');div.className='cell';
        let text='',owner='',term='',tip='',key='',isTheme=false,def=null;

        if(isCore){
          if(isCenter){text='25 Deals\nClosed by\nApril 2029';div.classList.add('core');}
          else{
            const sk=SURROUND_KEYS[cr*3+cc];
            if(sk){
              key='surround_'+sk.replace(/\W+/g,'_');
              const dl=SURROUND_DISPLAY[sk]||sk;
              const saved=state[key];
              text=saved?(saved.label||dl):dl;
              div.classList.add('theme-surround');isTheme=true;def={label:dl};
            }
          }
        }else if(td){
          if(isCenter){
            key='center_'+theme.replace(/\W+/g,'_');
            const saved=state[key];
            text=saved?(saved.label||td.center):td.center;
            div.classList.add('theme');isTheme=true;def={label:td.center};
          }else{
            const li=cr*3+cc;const ai=li<4?li:li-1;
            const dc=td.cells[ai]||null;
            key=`em_b${bi}_r${cr}_c${cc}`;
            const saved=state[key];
            if(saved!==undefined){
              text=saved.label||'';owner=saved.owner||(dc?dc.o:'CEO');
              term=saved.term||(dc?dc.t:'L');tip=saved.tip||'';
            }else if(dc){text=dc.l;owner=dc.o;term=dc.t;tip=dc.tip;}
            def=dc;div.classList.add('editable');
            if(text){div.classList.add(term==='N'?'near-term':'long-term');}else{div.classList.add('empty');}
            if(tip)div.classList.add('has-tip');
            const tag=document.createElement('div');tag.className='owner-tag';tag.textContent=text?(OWNER_LABEL[owner]||''):'';div.appendChild(tag);
          }
        }

        const span=document.createElement('span');span.style.cssText='display:block;width:100%;white-space:pre-line;pointer-events:none;';span.textContent=text;div.appendChild(span);
        const dot=document.createElement('div');dot.className='tip-dot';div.appendChild(dot);
        if(tip){const tt=document.createElement('div');tt.className='tooltip';tt.textContent=tip;div.insertBefore(tt,dot);}

        if(key){
          const _k=key,_it=isTheme,_d=def;
          div.addEventListener('click',()=>{
            const cl=div.querySelector('span').textContent;
            const sv=state[_k]||{};
            const co=_it?'':(sv.owner||(_d?_d.o:'CEO'));
            const ct=_it?'':(sv.term||(_d?_d.t:'L'));
            const cp=div.querySelector('.tooltip')?div.querySelector('.tooltip').textContent:'';
            openEditor(div,_k,cl,co,ct,cp,_it,_d);
          });
        }
        block.appendChild(div);
      }
    }
    grid.appendChild(block);
  }
}

loadState();
</script>
</body>
</html>
